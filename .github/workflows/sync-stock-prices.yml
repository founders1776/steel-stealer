name: Sync Stock & Prices

on:
  schedule:
    - cron: '0 6,18 * * *'  # Every 12 hours (6am, 6pm UTC)
  workflow_dispatch: {}       # Manual trigger button

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # headroom for the one-time map backfill + full sync

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: |
          pip install setuptools selenium undetected-chromedriver requests openpyxl
          sudo apt-get update && sudo apt-get install -y xvfb

      - name: Decrypt data bundle
        env:
          DATA_PASSPHRASE: ${{ secrets.DATA_PASSPHRASE }}
        run: |
          gpg --batch --yes --quiet --pinentry-mode loopback \
              --passphrase "$DATA_PASSPHRASE" \
              --decrypt data.tar.gz.gpg | tar xz
          ls -la product_names.json shopify_product_map.json

      - name: Mask competitor domains in logs
        run: |
          # PUBLIC repo → Action logs are world-readable. Register every domain-like
          # token in competitor_prices.json as a log mask so GitHub redacts it (***)
          # if any step echoes it. Structure-agnostic (regex over the file).
          if [ -f competitor_prices.json ]; then
            python3 -c "import re; [print('::add-mask::'+d) for d in sorted(set(re.findall(r'[a-z0-9][a-z0-9-]*\.(?:com|net|org|co|shop|store|us)', open('competitor_prices.json').read().lower())))]"
          fi

      - name: Materialize dual-source brand list
        env:
          DUAL_SOURCE_BRANDS: ${{ secrets.DUAL_SOURCE_BRANDS }}
        run: |
          # Brand list is kept out of this PUBLIC repo. CI writes it from a
          # secret, then the re-encrypt step folds it into the encrypted bundle
          # (so later runs still have it if the secret is ever removed).
          if [ -n "${DUAL_SOURCE_BRANDS:-}" ]; then
            printf '%s' "$DUAL_SOURCE_BRANDS" > dual_source_brands.json
            echo "Wrote dual_source_brands.json from secret"
          elif [ -f dual_source_brands.json ]; then
            echo "Using dual_source_brands.json from bundle"
          else
            echo '[]' > dual_source_brands.json
            echo "WARNING: DUAL_SOURCE_BRANDS secret unset and none in bundle — dual-source skip disabled this run"
          fi

      - name: Ensure shopify map has vendor (one-time backfill)
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
        run: |
          # The dual-source skip keys on the Shopify vendor stored in the map.
          # Older bundles predate vendor capture — rebuild once, then the
          # re-encrypt step ships the enriched map. Idempotent: a map that
          # already carries vendor is left untouched.
          if python -c "import json,sys; m=json.load(open('shopify_product_map.json')); sys.exit(0 if any(v.get('vendor') for v in m.values()) else 1)"; then
            echo "Map already has vendor — skipping rebuild"
          else
            echo "Map missing vendor — rebuilding from Shopify"
            python build_shopify_map.py
          fi

      - name: Run sync
        id: sync
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SC_ACCOUNT: ${{ secrets.SC_ACCOUNT }}
          SC_USER: ${{ secrets.SC_USER }}
          SC_PASSWORD: ${{ secrets.SC_PASSWORD }}
        run: xvfb-run --auto-servernum python sync_stock_prices.py

      - name: Re-encrypt and commit data bundle
        if: always() && steps.sync.outcome != 'cancelled'
        env:
          DATA_PASSPHRASE: ${{ secrets.DATA_PASSPHRASE }}
        run: |
          set -euo pipefail
          # Keep this list in sync with scrape-competitor-prices.yml — a tar
          # list mismatch would silently drop files from the bundle.
          FILES=""
          for f in product_names.json shopify_product_map.json price_locks.json \
                   competitor_prices.json bulk_import_progress.json \
                   missing_import_progress.json dual_source_skus.json \
                   dual_source_brands.json competitors.json reprice_brands.json \
                   reprice_targets.json competitor_price_progress.json \
                   desco_products.json desco_ingest_progress.json source_map.json; do
            [ -f "$f" ] && FILES="$FILES $f"
          done
          tar --sort=name --mtime='UTC 2020-01-01' --owner=0 --group=0 -czf data.tar.gz $FILES
          NEW_HASH=$(sha256sum data.tar.gz | cut -d' ' -f1)
          OLD_HASH=$(cat .data-bundle.hash 2>/dev/null || true)
          if [ "$NEW_HASH" = "$OLD_HASH" ]; then
            echo "Bundle contents unchanged (sha256=$NEW_HASH) — skipping commit"
            rm data.tar.gz
            exit 0
          fi
          echo "$NEW_HASH" > .data-bundle.hash
          gpg --batch --yes --quiet --pinentry-mode loopback \
              --passphrase "$DATA_PASSPHRASE" --cipher-algo AES256 \
              --symmetric --output data.tar.gz.gpg data.tar.gz
          rm data.tar.gz
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.tar.gz.gpg .data-bundle.hash
          git commit -m "data: refresh encrypted bundle (run ${GITHUB_RUN_ID})"
          git push

      - name: Send email report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.zoho.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Steel Stealer Sync Report"
          to: ${{ secrets.EMAIL_USERNAME }}
          from: ${{ secrets.EMAIL_USERNAME }}
          body: ${{ steps.sync.outputs.summary }}

      - name: Send phone notification
        if: always()
        run: |
          curl -s \
            -H "Title: Sync ${{ steps.sync.outcome }}" \
            -H "Priority: ${{ steps.sync.outcome == 'failure' && 'high' || 'default' }}" \
            -H "Tags: ${{ steps.sync.outcome == 'failure' && 'warning' || 'white_check_mark' }}" \
            -d "Steel Stealer sync ${{ steps.sync.outcome }}. Check email for details." \
            ntfy.sh/steelstealer-c8db7c7f50b7
